name: Accessibility CI

"on":
  push:
  pull_request:

jobs:
  accessibility-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Install accessibility tooling
        run: npm install --no-save html-validate

      - name: Run accessibility audit
        run: |
          echo "Running html-validate against source and built HTML"
          set +e
          npx html-validate --formatter json client/index.html client/dist/index.html > html-validate-report.json
          EXIT_CODE=$?
          cat html-validate-report.json
          exit $EXIT_CODE

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-validate-report
          path: html-validate-report.json