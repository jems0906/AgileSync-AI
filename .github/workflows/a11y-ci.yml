name: Accessibility CI

"on":
  push:
  pull_request:

jobs:
  accessibility-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve system Chrome path
        run: |
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "No Chrome/Chromium binary found on runner"
            exit 1
          fi
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          "$CHROME_PATH" --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Start static server
        run: |
          npx -y serve -s client/dist -l 4173 &

      - name: Wait for app
        run: npx -y wait-on http://127.0.0.1:4173

      - name: Run accessibility audit
        run: |
          echo "Running Pa11y with CHROME_PATH=$CHROME_PATH"
          PUPPETEER_EXECUTABLE_PATH="$CHROME_PATH" npx -y pa11y-ci --config .pa11yci.cjs http://127.0.0.1:4173 --threshold 0